services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    profiles: [local, develop]
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: "Asia/Seoul"

    ports:
      - "${PG_PORT}:5432"

    volumes:
      - tablenow_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - tablenow-network

volumes:
  tablenow_data:

networks:
  tablenow-network: