spring:
  application:
    name: tablenow
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: info

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000
  refresh-expiration: 1209600000

admin:
  email: ${ADMIN_EMAIL}
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}
  phone-number: ${ADMIN_PHONENUMBER}